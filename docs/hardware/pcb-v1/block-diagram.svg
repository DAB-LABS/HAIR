<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c5d9e"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">HAIR PCB v1 - Block Diagram</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#666">Octagonal IR transceiver, ESP32-C3 based, single SMT pass</text>

  <!-- Power Input section -->
  <rect x="40" y="90" width="1120" height="160" fill="#e8f5e8" stroke="#7a9b7a" stroke-width="1.5" rx="6"/>
  <text x="55" y="112" font-size="14" font-weight="bold" fill="#2c5d2c">Power Input + USB</text>

  <rect x="70" y="135" width="160" height="80" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="150" y="160" text-anchor="middle" font-size="13" font-weight="bold">USB-C (J1)</text>
  <text x="150" y="178" text-anchor="middle" font-size="10" fill="#555">12 or 16 pin USB 2.0</text>
  <text x="150" y="192" text-anchor="middle" font-size="10" fill="#555">CC1, CC2 with 5.1k</text>
  <text x="150" y="205" text-anchor="middle" font-size="10" fill="#555">pulldowns to GND</text>

  <rect x="290" y="135" width="160" height="80" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="370" y="160" text-anchor="middle" font-size="13" font-weight="bold">USBLC6-2 (U3)</text>
  <text x="370" y="178" text-anchor="middle" font-size="10" fill="#555">USB ESD protection</text>
  <text x="370" y="192" text-anchor="middle" font-size="10" fill="#555">on D+, D-, CC</text>

  <rect x="510" y="135" width="160" height="80" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="590" y="160" text-anchor="middle" font-size="13" font-weight="bold">5V Bulk Caps</text>
  <text x="590" y="178" text-anchor="middle" font-size="10" fill="#555">10 uF at USB input</text>
  <text x="590" y="192" text-anchor="middle" font-size="10" fill="#555">220 uF polymer near</text>
  <text x="590" y="205" text-anchor="middle" font-size="10" fill="#555">LED ring (C1, C2)</text>

  <rect x="730" y="135" width="160" height="80" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="810" y="160" text-anchor="middle" font-size="13" font-weight="bold">ME6211 LDO (U2)</text>
  <text x="810" y="178" text-anchor="middle" font-size="10" fill="#555">5V to 3.3V, 500 mA</text>
  <text x="810" y="192" text-anchor="middle" font-size="10" fill="#555">200 mV dropout</text>
  <text x="810" y="205" text-anchor="middle" font-size="10" fill="#555">1 uF in / 1 uF out</text>

  <rect x="950" y="135" width="180" height="80" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="1040" y="158" text-anchor="middle" font-size="12" font-weight="bold">3.3V module decoupling</text>
  <text x="1040" y="178" text-anchor="middle" font-size="10" fill="#555">10 uF + 1 uF + 100 nF</text>
  <text x="1040" y="192" text-anchor="middle" font-size="10" fill="#555">(C5, C6, C7) close to</text>
  <text x="1040" y="205" text-anchor="middle" font-size="10" fill="#555">ESP32 VDD pin</text>

  <!-- VBUS arrow USB-C to ESD pair, also VBUS branches -->
  <line x1="230" y1="175" x2="290" y2="175" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="260" y="170" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">VBUS</text>

  <line x1="450" y1="175" x2="510" y2="175" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="480" y="170" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">5V</text>

  <line x1="670" y1="175" x2="730" y2="175" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="700" y="170" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">5V</text>

  <line x1="890" y1="175" x2="950" y2="175" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="920" y="170" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">3V3</text>

  <!-- MCU section -->
  <rect x="40" y="280" width="600" height="280" fill="#f0f0f5" stroke="#7777a0" stroke-width="1.5" rx="6"/>
  <text x="55" y="302" font-size="14" font-weight="bold" fill="#444477">MCU + Programming</text>

  <rect x="80" y="325" width="260" height="200" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="210" y="358" text-anchor="middle" font-size="15" font-weight="bold">ESP32-C3-MINI-1</text>
  <text x="210" y="378" text-anchor="middle" font-size="11" fill="#555">(U1)</text>
  <text x="210" y="402" text-anchor="middle" font-size="10" fill="#555">Native USB-Serial-JTAG</text>
  <text x="210" y="418" text-anchor="middle" font-size="10" fill="#555">on GPIO18 (D-) / GPIO19 (D+)</text>
  <text x="210" y="442" text-anchor="middle" font-size="10" fill="#555">WiFi b/g/n, BLE 5</text>
  <text x="210" y="458" text-anchor="middle" font-size="10" fill="#555">PCB antenna (keepout req.)</text>
  <text x="210" y="482" text-anchor="middle" font-size="10" fill="#555">Strapping pins: GPIO2, 8, 9</text>
  <text x="210" y="498" text-anchor="middle" font-size="10" fill="#555">GPIO9 used for BOOT btn</text>

  <rect x="380" y="325" width="240" height="90" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="500" y="350" text-anchor="middle" font-size="13" font-weight="bold">BOOT (SW2)</text>
  <text x="500" y="370" text-anchor="middle" font-size="10" fill="#555">Tactile SMD switch</text>
  <text x="500" y="385" text-anchor="middle" font-size="10" fill="#555">GPIO9 to GND</text>
  <text x="500" y="400" text-anchor="middle" font-size="10" fill="#555">10k pullup to 3.3V (R13)</text>

  <rect x="380" y="435" width="240" height="90" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="500" y="460" text-anchor="middle" font-size="13" font-weight="bold">RESET (SW1)</text>
  <text x="500" y="480" text-anchor="middle" font-size="10" fill="#555">EN to GND</text>
  <text x="500" y="495" text-anchor="middle" font-size="10" fill="#555">10k pullup + 1 uF debounce</text>
  <text x="500" y="510" text-anchor="middle" font-size="10" fill="#555">(R12, C8)</text>

  <!-- USB data lines from USBLC6 to ESP32 -->
  <path d="M 370 215 L 370 250 L 90 250 L 90 325" fill="none" stroke="#2c5d9e" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="220" y="246" font-size="10" fill="#2c5d9e" font-weight="bold">USB D+/D- (GPIO19/18)</text>

  <!-- IR TX section -->
  <rect x="660" y="280" width="500" height="280" fill="#fdf4e0" stroke="#b09060" stroke-width="1.5" rx="6"/>
  <text x="675" y="302" font-size="14" font-weight="bold" fill="#7a5520">IR Transmit</text>

  <rect x="690" y="325" width="200" height="100" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="790" y="350" text-anchor="middle" font-size="13" font-weight="bold">AO3400 N-FET (Q1)</text>
  <text x="790" y="370" text-anchor="middle" font-size="10" fill="#555">Gate from GPIO4</text>
  <text x="790" y="385" text-anchor="middle" font-size="10" fill="#555">1k series (R8)</text>
  <text x="790" y="400" text-anchor="middle" font-size="10" fill="#555">10k pulldown (R9)</text>
  <text x="790" y="415" text-anchor="middle" font-size="10" fill="#555">drain sinks LED bus</text>

  <rect x="920" y="325" width="220" height="180" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="1030" y="352" text-anchor="middle" font-size="13" font-weight="bold">7x IR LED ring</text>
  <text x="1030" y="370" text-anchor="middle" font-size="11">(D1 to D7)</text>
  <text x="1030" y="392" text-anchor="middle" font-size="10" fill="#555">Side firing SMD 940 nm</text>
  <text x="1030" y="408" text-anchor="middle" font-size="10" fill="#555">+/- 60 deg half angle</text>
  <text x="1030" y="424" text-anchor="middle" font-size="10" fill="#555">150 mA pulsed each</text>
  <text x="1030" y="440" text-anchor="middle" font-size="10" fill="#555">22 ohm series per LED</text>
  <text x="1030" y="456" text-anchor="middle" font-size="10" fill="#555">(R1 to R7)</text>
  <text x="1030" y="478" text-anchor="middle" font-size="10" fill="#555">anodes to 5V, cathodes</text>
  <text x="1030" y="492" text-anchor="middle" font-size="10" fill="#555">to MOSFET drain</text>

  <!-- GPIO4 arrow from ESP32 to MOSFET gate -->
  <path d="M 340 380 L 660 380" fill="none" stroke="#2c5d9e" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="500" y="375" text-anchor="middle" font-size="10" fill="#2c5d9e" font-weight="bold">GPIO4 (TX gate)</text>

  <!-- MOSFET to LED ring -->
  <line x1="890" y1="375" x2="920" y2="375" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- IR RX + Status section -->
  <rect x="40" y="590" width="800" height="220" fill="#eaf4fb" stroke="#5588b8" stroke-width="1.5" rx="6"/>
  <text x="55" y="612" font-size="14" font-weight="bold" fill="#1f4f7a">IR Receive + Status</text>

  <rect x="80" y="635" width="320" height="100" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="240" y="660" text-anchor="middle" font-size="13" font-weight="bold">TSMP58000 (U4)</text>
  <text x="240" y="678" text-anchor="middle" font-size="10" fill="#555">Wideband IR receiver (30 to 56 kHz)</text>
  <text x="240" y="694" text-anchor="middle" font-size="10" fill="#555">VS via 100 ohm RC isolation (R10)</text>
  <text x="240" y="710" text-anchor="middle" font-size="10" fill="#555">4.7 uF + 100 nF at pin (C9, C10)</text>
  <text x="240" y="726" text-anchor="middle" font-size="10" fill="#555">47k output pullup (R11)</text>

  <rect x="440" y="635" width="240" height="100" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="560" y="660" text-anchor="middle" font-size="13" font-weight="bold">WS2812B (U5)</text>
  <text x="560" y="678" text-anchor="middle" font-size="10" fill="#555">RGB status LED, single pixel</text>
  <text x="560" y="694" text-anchor="middle" font-size="10" fill="#555">5V supply, 3.3V data</text>
  <text x="560" y="710" text-anchor="middle" font-size="10" fill="#555">100 nF local decoupling (C11)</text>
  <text x="560" y="726" text-anchor="middle" font-size="10" fill="#555">Driven by GPIO6</text>

  <rect x="80" y="750" width="600" height="46" fill="white" stroke="#333" stroke-width="1.2" rx="3"/>
  <text x="380" y="770" text-anchor="middle" font-size="13" font-weight="bold">Test pads (back side)</text>
  <text x="380" y="787" text-anchor="middle" font-size="10" fill="#555">TP1: 3.3V | TP2: GND | TP3: GPIO7 | TP4: GPIO10</text>

  <!-- RX arrow GPIO5 -->
  <path d="M 240 635 L 240 575 L 340 575 L 340 525" fill="none" stroke="#2c5d9e" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="120" y="572" text-anchor="middle" font-size="10" fill="#2c5d9e" font-weight="bold">GPIO5 (RX in)</text>

  <!-- WS2812 GPIO6 -->
  <path d="M 560 635 L 560 575 L 280 575 L 280 525" fill="none" stroke="#2c5d9e" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="455" y="572" text-anchor="middle" font-size="10" fill="#2c5d9e" font-weight="bold">GPIO6 (LED data)</text>

  <!-- Layout sketch (right side, bottom) -->
  <rect x="870" y="590" width="290" height="220" fill="#ffffff" stroke="#999" stroke-width="1.5" rx="6"/>
  <text x="885" y="612" font-size="13" font-weight="bold" fill="#555">Form Factor (octagon)</text>
  <g transform="translate(1015, 705)">
    <polygon points="40,0 28,28 0,40 -28,28 -40,0 -28,-28 0,-40 28,-28" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- IR LEDs at 7 sides (top side is USB-C) -->
    <rect x="-8" y="-46" width="16" height="6" fill="#666"/>
    <text x="0" y="-50" text-anchor="middle" font-size="9" fill="#666">USB-C</text>
    <circle cx="28" cy="-28" r="3" fill="#c0392b"/>
    <circle cx="40" cy="0" r="3" fill="#c0392b"/>
    <circle cx="28" cy="28" r="3" fill="#c0392b"/>
    <circle cx="0" cy="40" r="3" fill="#c0392b"/>
    <circle cx="-28" cy="28" r="3" fill="#c0392b"/>
    <circle cx="-40" cy="0" r="3" fill="#c0392b"/>
    <circle cx="-28" cy="-28" r="3" fill="#c0392b"/>
    <text x="0" y="5" text-anchor="middle" font-size="9" fill="#555">RX + LED</text>
    <text x="0" y="18" text-anchor="middle" font-size="8" fill="#555">on top face</text>
  </g>
  <text x="1015" y="780" text-anchor="middle" font-size="10" fill="#555">~53 mm flat to flat</text>
  <text x="1015" y="794" text-anchor="middle" font-size="10" fill="#555">7 IR LEDs + 1 USB-C side</text>

  <!-- Legend -->
  <rect x="40" y="830" width="1120" height="50" fill="white" stroke="#ccc" stroke-width="1" rx="3"/>
  <text x="60" y="850" font-size="11" font-weight="bold">Legend:</text>
  <line x1="120" y1="847" x2="160" y2="847" stroke="#c0392b" stroke-width="2"/>
  <text x="170" y="851" font-size="10">Power (5V / 3.3V)</text>
  <line x1="320" y1="847" x2="360" y2="847" stroke="#2c5d9e" stroke-width="2"/>
  <text x="370" y="851" font-size="10">Signal / data</text>
  <line x1="490" y1="847" x2="530" y2="847" stroke="#333" stroke-width="2"/>
  <text x="540" y="851" font-size="10">High current path</text>
  <text x="700" y="851" font-size="10" fill="#555">GPIO map: TX=4, RX=5, LED=6, USB D-=18, USB D+=19, BOOT=9, RESET=EN</text>
  <text x="60" y="872" font-size="10" fill="#555">Strapping pins on ESP32-C3: GPIO2, GPIO8, GPIO9. GPIO9 used intentionally for BOOT. GPIO2, GPIO8 unused.</text>
</svg>
