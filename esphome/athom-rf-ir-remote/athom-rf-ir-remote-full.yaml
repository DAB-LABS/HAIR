# ============================================================================
# HAIR ESPHome Config
# ----------------------------------------------------------------------------
# Device:            Athom RF IR Remote (ESP32, RF433 + IR)
# Hardware revision: v3.0.1
# Variant:           full
# Contributor:       DAB-LABS
# Source:            https://github.com/athom-tech/esp32-configs
# License:           Apache 2.0
# Tested against:
#   HAIR:            0.2.0
#   HA Core:         2026.5.2
#   ESPHome:         2026.5.1
# Last verified:     2026-05-29
# Purpose:           RX+TX
# Hardware purchase: https://www.athom.tech/
# GPIO map:
#   GPIO25           IR TX (remote_transmitter)
#   GPIO33           IR RX (remote_receiver, inverted)
#   GPIO18           RF TX (remote_transmitter, 433 MHz)
#   GPIO19           RF RX (remote_receiver, 433 MHz, inverted)
#   GPIO27           Status LED
#   GPIO0            Button
# Notes:
#   - Standalone config -- no Athom package import. Everything is laid out
#     so you can see and customize every component.
#   - Based on Athom's athom-rf-ir-remote.yaml v3.0.1 with the HAIR
#     on_pronto legacy bridge added.
#   - RF hardware components are included but only IR is used by HAIR.
#   - The on_pronto bridge is only needed on HA 2026.4-2026.5. On HA
#     2026.6+, HAIR subscribes to the ir_rf_proxy receiver natively.
#   - BLE proxy, climate IR, and improv are included. Remove any sections
#     you do not need.
# ============================================================================

# --- Substitutions ---
# Change these to match your device.
substitutions:
  name: athom-rf-ir-remote-350628
  friendly_name: Athom RF IR Remote 1
  # Athom project metadata (used by dashboard_import)
  project_name: "China Athom Technology.Athom RF IR Remote"
  project_version: "v3.0.1"
  # Climate IR platform -- see https://esphome.io/components/climate/climate_ir/
  # Valid values: coolix, daikin, fujitsu_general, gree, hitachi_ac344,
  # climate_ir_lg, midea_ir, mitsubishi, tcl112, toshiba, whirlpool, etc.
  ac_platform: coolix

# --- Core ---

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  min_version: 2026.5.1
  project:
    name: "${project_name}"
    version: "${project_version}"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32dev
  variant: esp32
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

preferences:
  flash_write_interval: 1min

# --- Network and connectivity ---

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s
  # Start BLE scanning when API client connects, stop when it disconnects.
  on_client_connected:
    - esp32_ble_tracker.start_scan:
        continuous: true
  on_client_disconnected:
    if:
      condition:
        not:
          api.connected:
      then:
        - esp32_ble_tracker.stop_scan:

ota:
  - platform: esphome

logger:
  baud_rate: 0
  level: DEBUG

mdns:
  disabled: false

web_server:
  port: 80
  version: 3

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap: {}
  fast_connect: false
  domain: ".local"

captive_portal:

# --- BLE proxy ---
# Enables Bluetooth proxy for HA. Remove this section if you do not
# need BLE forwarding and want to save memory.

esp32_ble_tracker:
  scan_parameters:
    continuous: false
    active: true
    interval: 320ms
    window: 300ms

bluetooth_proxy:
  active: true

esp32_improv:
  authorizer: none

dashboard_import:
  package_import_url: github://athom-tech/esp32-configs/athom-rf-ir-remote.yaml

# =====================================================================
# IR Hardware
# =====================================================================

# --- IR Transmitter (TX) ---
remote_transmitter:
  # IR LED on GPIO25, 50% duty cycle for standard 38 kHz modulation.
  - pin:
      number: GPIO25
      inverted: false
    carrier_duty_percent: 50%
    non_blocking: true
    id: ir_transmitter

  # RF 433 MHz transmitter on GPIO18, 100% duty (OOK modulation).
  - pin:
      number: GPIO18
    carrier_duty_percent: 100%
    non_blocking: true
    id: rf_transmitter

# --- IR Receiver (RX) ---
remote_receiver:
  # RF 433 MHz receiver on GPIO19.
  - pin:
      number: GPIO19
      inverted: true
    dump: rc_switch
    tolerance: 25%
    id: rf_receiver

  # IR receiver on GPIO33.
  # The on_pronto trigger forwards every captured IR signal to the HA
  # event bus as a Pronto hex string. HAIR's Signal Monitor subscribes
  # to these events on HA 2026.4-2026.5.
  #
  # On HA 2026.6+, HAIR uses the native InfraredReceiverEntity from the
  # ir_rf_proxy section below. The on_pronto bridge is unused at that
  # point and can be removed.
  - pin:
      number: GPIO33
      inverted: true
    dump: all
    tolerance: 25%
    id: ir_receiver

    # --- HAIR legacy bridge (pre-2026.6) ---
    on_pronto:
      then:
        - homeassistant.event:
            event: esphome.remote_received
            data:
              protocol: PRONTO
              code: !lambda 'return x.data;'

# =====================================================================
# HA Native Infrared Platform
# =====================================================================
# These entries register the device as infrared entities in HA. HAIR
# discovers them automatically.
#
# On HA 2026.4-2026.5:
#   - TX entity (ir_proxy_transmitter) works for sending commands
#   - RX entity (ir_proxy_receiver) is exposed but HA cannot subscribe
#     to it yet, so HAIR uses the on_pronto bridge above
#
# On HA 2026.6+:
#   - TX entity works as before
#   - RX entity is a native InfraredReceiverEntity -- HAIR subscribes
#     to it directly, no bridge needed

infrared:
  - platform: ir_rf_proxy
    name: IR Proxy Transmitter
    id: ir_proxy_transmitter
    remote_transmitter_id: ir_transmitter

  - platform: ir_rf_proxy
    name: IR Proxy Receiver
    id: ir_proxy_receiver
    receiver_frequency: 38kHz
    remote_receiver_id: ir_receiver

# --- RF platform (not used by HAIR) ---
radio_frequency:
  - platform: ir_rf_proxy
    name: 433MHz RF Transmitter
    id: rf_proxy_transmitter
    frequency: 433.92MHz
    remote_transmitter_id: rf_transmitter

  - platform: ir_rf_proxy
    name: 433MHz RF Receiver
    id: rf_proxy_receiver
    frequency: 433.92MHz
    remote_receiver_id: rf_receiver

# =====================================================================
# Climate IR
# =====================================================================
# Built-in climate entity for AC control. Uses the IR transmitter and
# receiver directly. Change the platform in substitutions to match
# your AC brand.
climate:
  - platform: ${ac_platform}
    transmitter_id: ir_transmitter
    name: "AC"
    receiver_id: ir_receiver

# =====================================================================
# Diagnostics and UI
# =====================================================================

binary_sensor:
  - platform: status
    name: "Status"
    entity_category: diagnostic

  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
      inverted: true
    name: "Button"
    disabled_by_default: true
    on_multi_click:
      - timing:
          - ON for at least 4s
        then:
          - button.press: Reset

sensor:
  - platform: uptime
    name: "Uptime Sensor"
    id: uptime_sensor
    type: timestamp
    entity_category: diagnostic

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""

button:
  - platform: restart
    name: "Restart"
    entity_category: config

  - platform: factory_reset
    name: "Factory Reset"
    id: Reset
    entity_category: config

  - platform: safe_mode
    name: "Safe Mode"
    internal: false
    entity_category: config

light:
  - platform: status_led
    name: "Status LED"
    disabled_by_default: true
    pin: GPIO27

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "Mac Address"
      entity_category: diagnostic

  - platform: template
    name: "Last Restart"
    id: device_last_restart
    icon: mdi:clock
    entity_category: diagnostic

time:
  - platform: sntp
    id: sntp_time
    timezone: ""
    update_interval: 6h
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    on_time_sync:
      then:
        - if:
            condition:
              lambda: 'return id(device_last_restart).state == "";'
            then:
              - text_sensor.template.publish:
                  id: device_last_restart
                  state: !lambda 'return id(sntp_time).now().strftime("%a %d %b %Y - %I:%M:%S %p");'
