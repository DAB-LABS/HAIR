esphome:
  name: hair2
  friendly_name: HAIR2

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HAIR2 Fallback"
    password: !secret ap_password

captive_portal:

# --- Power Enable (REQUIRED for this board) ---
# GPIO21 gates power to the IR LED and receiver.
# Without this HIGH, no IR activity will work.
switch:
  - platform: gpio
    pin: GPIO21
    id: ir_power
    name: "HAIR2 IR Power"
    restore_mode: ALWAYS_ON
    entity_category: config

# --- IR Transmitter (TX) ---
remote_transmitter:
  id: ir_tx
  pin: GPIO4
  carrier_duty_percent: 50%
  non_blocking: true

# --- IR Receiver (RX) ---
remote_receiver:
  id: ir_rx
  pin:
    number: GPIO14
    inverted: true
    mode:
      input: true
      pullup: true
  dump: all
  tolerance: 25%
  idle: 10ms

  on_pronto:
    then:
      - homeassistant.event:
          event: esphome.remote_received
          data:
            protocol: "PRONTO"
            code: !lambda 'return x.data;'

# --- HA Native Infrared Platform (ir_rf_proxy) ---
infrared:
  - platform: ir_rf_proxy
    name: HAIR2 TX
    id: ir_proxy_tx
    remote_transmitter_id: ir_tx
  - platform: ir_rf_proxy
    name: HAIR2 RX
    id: ir_proxy_rx
    receiver_frequency: 38kHz
    remote_receiver_id: ir_rx
